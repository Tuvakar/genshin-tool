<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Constellation</title>
<link rel="stylesheet" href="styles.css?v=20">
</head>
<body data-view="main-menu">
    <header class="header-section">
        <h1 class="app-title">Constellation</h1>
        <div class="header-right">
            <button class="account-pill" id="header-account-pill" title="Switch account" aria-label="Active account">
                <span class="account-pill-dot"></span>
                <span id="header-account-name">Main</span>
            </button>
            <div id="live-clock" aria-label="Current time">--:--:--</div>
        </div>
    </header>

    <div id="back-button-hotspot">
        <button class="btn-back-icon" id="btn-back-main" title="Back to Menu" aria-label="Back to Menu">
            <svg viewBox="0 0 24 24"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
        </button>
    </div>

    <main>
        <!-- Constellation main menu — stars + connecting lines are rendered by JS
             (renderConstellation) based on the selected layout preset (see app.js). -->
        <div id="main-menu" class="view">
            <div class="constellation-sky">
                <svg class="constellation-svg" viewBox="0 0 100 100" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
                    <g class="const-lines"></g>
                </svg>
            </div>
            <!-- Nav stars are injected here by renderConstellation() -->
        </div>

        <div id="view-map" class="view"></div>
        <div id="view-tasks" class="view"></div>
        <div id="view-primos" class="view"></div>
        <div id="view-gacha" class="view"></div>
        <div id="view-calendar" class="view"></div>
        <div id="view-settings" class="view"></div>
    </main>

    <div id="status-bar" class="status-bar">
        <span class="status-item"><span class="status-label">RESIN</span> <span id="status-resin">0</span><span class="status-sub">/200</span></span>
        <span class="status-divider"></span>
        <span class="status-item"><span class="status-label">STREAK</span> <span id="status-streak">0</span></span>
        <span class="status-divider"></span>
        <span class="status-item"><span class="status-label">5★ PITY</span> <span id="status-pity">0</span><span class="status-sub">/90</span></span>
    </div>

    <div id="custom-modal" class="modal-overlay"></div>

    <script src="app.js?v=20"></script>
</body>
</html>
